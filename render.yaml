services:
  - type: web
    name: brutal-thoughts
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: brutal-thoughts
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromService:
          type: postgres
          name: brutal-db
          property: host
      - key: DB_PORT
        fromService:
          type: postgres
          name: brutal-db
          property: port
      - key: DB_DATABASE
        fromService:
          type: postgres
          name: brutal-db
          property: database
      - key: DB_USERNAME
        fromService:
          type: postgres
          name: brutal-db
          property: user
      - key: DB_PASSWORD
        fromService:
          type: postgres
          name: brutal-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info

databases:
  - name: brutal-db
    databaseName: brutal
    plan: free
    postgresMajorVersion: 16
